<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>工业智能招标需求看板</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/style.css" />
  </head>
  <body>
    <div class="bg-glow bg-glow-left" aria-hidden="true"></div>
    <div class="bg-glow bg-glow-right" aria-hidden="true"></div>

    <main class="container">
      <header class="hero">
        <h1>工业智能招标需求看板</h1>
        <p class="hero-description">
          聚合公开招标公告，AI 自动提取需求摘要。数据每日更新。
        </p>
        <p class="hero-update">最后更新：<span id="lastUpdateTime">加载中…</span></p>
      </header>

      <section class="stats-row" aria-label="数据概览">
        <div class="stat-card">
          <div class="stat-value" id="statTotal">—</div>
          <div class="stat-label">总招标数</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statWeekNew">—</div>
          <div class="stat-label">本周新增</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statAvgBudget">—</div>
          <div class="stat-label">平均预算</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statProvinces">—</div>
          <div class="stat-label">覆盖省份</div>
        </div>
      </section>

      <section class="controls" aria-label="筛选与搜索">
        <div class="control-item search-wrap">
          <label for="searchInput">搜索</label>
          <input id="searchInput" type="search" placeholder="输入关键词：项目名、单位、地区、摘要等" />
        </div>

        <div class="control-item">
          <label for="provinceFilter">省份</label>
          <select id="provinceFilter">
            <option value="">全部</option>
          </select>
        </div>

        <div class="control-item">
          <label for="cityFilter">城市</label>
          <select id="cityFilter">
            <option value="">全部</option>
          </select>
        </div>

        <div class="control-item">
          <label for="budgetMinInput">预算区间（万元）</label>
          <div class="range-inputs">
            <input id="budgetMinInput" type="number" min="0" step="0.01" placeholder="最小值" />
            <span class="range-sep">-</span>
            <input id="budgetMaxInput" type="number" min="0" step="0.01" placeholder="最大值" />
          </div>
        </div>

        <div class="control-item checkbox-wrap">
          <label class="checkbox-label" for="showNoRequirement">
            <input id="showNoRequirement" type="checkbox" />
            包含未提取需求的项目
          </label>
          <label class="checkbox-label" for="showExpired">
            <input id="showExpired" type="checkbox" />
            显示已截止的条目
          </label>
        </div>
      </section>

      <section class="meta-row" aria-live="polite">
        <div id="summaryText"></div>
        <div class="pager-controls">
          <label for="pageSizeSelect">每页条数</label>
          <select id="pageSizeSelect">
            <option value="20">20</option>
            <option value="50" selected>50</option>
            <option value="100">100</option>
          </select>
        </div>
      </section>

      <section class="table-shell">
        <table id="tenderTable">
          <thead>
            <tr>
              <th data-key="pub_time">发布日期</th>
              <th data-key="deadline">截止日期</th>
              <th data-key="project_name">项目标题</th>
              <th data-key="province_city">地区</th>
              <th data-key="company_name">采购单位</th>
              <th data-key="budget">预算</th>
              <th data-key="requirement_brief">需求摘要</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
        <div id="emptyState" class="empty-state" hidden>没有匹配的数据。</div>
      </section>

      <nav class="pagination" aria-label="分页导航">
        <div id="pageNumbers" class="page-numbers"></div>
      </nav>
    </main>

    <!-- 招标详情弹窗 -->
    <div id="detailModal" class="modal-overlay" hidden role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-box">
        <button class="modal-close" id="modalClose" aria-label="关闭">✕</button>
        <h2 id="modalTitle" class="modal-title"></h2>
        <div class="modal-meta" id="modalMeta"></div>
        <div id="modalBriefSection">
          <h3 class="modal-section-title">需求摘要</h3>
          <p id="modalBrief" class="modal-content"></p>
        </div>
        <div id="modalDescSection">
          <h3 class="modal-section-title">需求详情</h3>
          <p id="modalDesc" class="modal-content"></p>
        </div>
        <div class="modal-actions">
          <a id="modalLink" href="#" target="_blank" rel="noopener noreferrer" class="modal-btn-primary">查看原文 →</a>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="assets/app.js"></script>
  </body>
</html>
