name: Daily Run

on:
  workflow_dispatch:
  schedule:
    - cron: "0 20 */3 * *"  # 每三天北京时间 04:00（UTC 20:00）

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      TZ: 'Asia/Shanghai'
      CCGP_ENABLE_ATTACHMENTS: "true"
      CCGP_ENABLE_LLM: "true"
      MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
      VOLC_API_KEY: ${{ secrets.VOLC_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      CCGP_HTTP_TIMEOUT: "30"
      CCGP_DOWNLOAD_TIMEOUT: "45"
      CCGP_MAX_ATTACHMENTS: "2"
      CCGP_SLEEP_MIN: "1.0"
      CCGP_SLEEP_MAX: "3.0"
      CCGP_SKIP_REPEAT_FAILED_ATTACHMENTS: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        run: python src/ccgp_collect.py --days 1

      - name: Commit updated CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ccgp/data/tender_items.csv
          if git diff --cached --quiet; then
            echo "No CSV changes to commit."
          else
            git commit -m "chore: update tender_items.csv [skip ci]"
            git status --porcelain
            git pull --rebase --autostash origin main
            git push
          fi

      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ccgp-logs-${{ github.run_id }}
          path: src/ccgp/data/logs/
          if-no-files-found: warn

      - name: Upload filter trace artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ccgp-filter-trace-${{ github.run_id }}
          path: src/ccgp/data/filter_trace/
          if-no-files-found: warn

